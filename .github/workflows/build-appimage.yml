name: Build AppImage

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # nötig zum Anlegen/Aktualisieren von Releases

jobs:
  appimage:
    runs-on: ubuntu-22.04
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: System-Werkzeuge (FUSE, squashfs, desktop-utils)
        run: sudo apt-get update && sudo apt-get install -y libfuse2 squashfs-tools desktop-file-utils

      - name: Build-Werkzeuge installieren
        run: python -m pip install --upgrade pip build python-appimage

      - name: Wheel bauen
        run: python -m build --wheel

      - name: AppImage-Rezept vorbereiten
        run: |
          mkdir -p build_recipe
          cp packaging/kopierer.desktop packaging/kopierer.png build_recipe/
          cp dist/*.whl build_recipe/
          realpath build_recipe/*.whl > build_recipe/requirements.txt
          echo "--- requirements.txt ---"; cat build_recipe/requirements.txt

      - name: AppDir mit python-appimage bauen
        env:
          APPIMAGE_EXTRACT_AND_RUN: '1'
        run: python-appimage build app -p 3.12 build_recipe

      # python-appimage packt mit der neuen statischen Runtime, die das ältere
      # libappimage/AppImageLauncher nicht registrieren kann. Wir entpacken das
      # AppDir und packen es mit der klassischen, breit kompatiblen Runtime neu.
      - name: AppDir aus dem gebauten AppImage entpacken
        run: |
          APP=$(ls *.AppImage | head -1)
          echo "Gebaut: $APP"
          rm -rf AppDir
          for OFF in $(grep -aboP '\x68\x73\x71\x73' "$APP" | cut -d: -f1); do
            if unsquashfs -q -d AppDir -o "$OFF" "$APP" >/dev/null 2>&1; then
              echo "AppDir aus SquashFS-Offset $OFF entpackt"; break
            fi
          done
          test -e AppDir/AppRun && test -e AppDir/kopierer.desktop
          # AppStream-Metadaten der Basis-Python entfernen (sonst validiert
          # appimagetool sie und bricht ggf. ab)
          rm -rf AppDir/usr/share/metainfo

      - name: Mit klassischer Runtime neu packen
        env:
          APPIMAGE_EXTRACT_AND_RUN: '1'
          ARCH: x86_64
        run: |
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          # Klassische, weit verbreitete Type-2-Runtime (~187 KB)
          wget -q https://github.com/AppImage/AppImageKit/releases/download/13/runtime-x86_64 -O runtime-x86_64
          mkdir -p out
          ./appimagetool --runtime-file runtime-x86_64 AppDir out/Kopierer-x86_64.AppImage
          chmod +x out/Kopierer-x86_64.AppImage
          ls -la out/
          echo "--- SquashFS-Offset der neuen Datei (sollte klein sein) ---"
          grep -aboP '\x68\x73\x71\x73' out/Kopierer-x86_64.AppImage | head -1

      - name: Als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: Kopierer-x86_64.AppImage
          path: out/Kopierer-x86_64.AppImage
          if-no-files-found: error

      # --- Releases: bei jedem main-Build ein rollierendes "continuous"-Release,
      #     bei einem v*-Tag ein reguläres versioniertes Release ---
      - name: Continuous-Release (bei Push auf main)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete continuous --yes --cleanup-tag 2>/dev/null || true
          gh release create continuous out/Kopierer-x86_64.AppImage \
            --title "Continuous build (main)" \
            --notes "Automatischer AppImage-Build vom neuesten main-Stand (Commit ${GITHUB_SHA:0:7})." \
            --prerelease --target "$GITHUB_SHA"

      - name: Versions-Release (bei v*-Tag)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" out/Kopierer-x86_64.AppImage \
            --title "$GITHUB_REF_NAME" \
            --notes "Release $GITHUB_REF_NAME" \
          || gh release upload "$GITHUB_REF_NAME" out/Kopierer-x86_64.AppImage --clobber
