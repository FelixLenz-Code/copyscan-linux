name: Build AppImage

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # nötig zum Anlegen/Aktualisieren von Releases

jobs:
  appimage:
    runs-on: ubuntu-22.04
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: System-Werkzeuge (FUSE, squashfs, desktop-utils)
        run: sudo apt-get update && sudo apt-get install -y libfuse2 squashfs-tools desktop-file-utils

      - name: Build-Werkzeuge installieren
        run: python -m pip install --upgrade pip build python-appimage

      - name: Wheel bauen
        run: python -m build --wheel

      - name: AppImage-Rezept vorbereiten
        run: |
          mkdir -p build_recipe
          cp packaging/kopierer.desktop packaging/kopierer.png build_recipe/
          cp dist/*.whl build_recipe/
          realpath build_recipe/*.whl > build_recipe/requirements.txt
          echo "--- requirements.txt ---"; cat build_recipe/requirements.txt

      - name: AppDir mit python-appimage bauen
        env:
          APPIMAGE_EXTRACT_AND_RUN: '1'
        run: python-appimage build app -p 3.12 build_recipe

      # python-appimage packt mit der neuen statischen Runtime, die das ältere
      # libappimage/AppImageLauncher nicht registrieren kann. Wir entpacken das
      # AppDir und packen es mit der klassischen, breit kompatiblen Runtime neu.
      - name: AppDir aus dem gebauten AppImage entpacken
        run: |
          APP=$(ls *.AppImage | head -1)
          echo "Gebaut: $APP"
          rm -rf AppDir
          for OFF in $(grep -aboP '\x68\x73\x71\x73' "$APP" | cut -d: -f1); do
            if unsquashfs -q -d AppDir -o "$OFF" "$APP" >/dev/null 2>&1; then
              echo "AppDir aus SquashFS-Offset $OFF entpackt"; break
            fi
          done
          test -e AppDir/AppRun && test -e AppDir/kopierer.desktop
          # AppStream-Metadaten der Basis-Python entfernen
          rm -rf AppDir/usr/share/metainfo

          # AppRun korrigieren: python-appimage lässt AppRun auf den nackten
          # Python-Wrapper zeigen -> beim Start ohne Argumente öffnet sich nur
          # ein Interpreter, die App startet nicht. Wir lassen AppRun stattdessen
          # den kopierer-Starter aufrufen.
          rm -f AppDir/AppRun
          printf '%s\n' \
            '#!/bin/bash' \
            'HERE="$(dirname "$(readlink -f "$0")")"' \
            'exec "$HERE/usr/bin/kopierer" "$@"' > AppDir/AppRun
          chmod +x AppDir/AppRun
          echo "--- AppRun ---"; cat AppDir/AppRun

      - name: Mit klassischer Runtime + gzip neu packen
        run: |
          # Klassische, weit verbreitete fuse2-Type-2-Runtime (~185 KB), die
          # auch das ältere libappimage/AppImageLauncher registrieren kann.
          wget -q https://github.com/AppImage/AppImageKit/releases/download/13/obsolete-runtime-x86_64 -O runtime-x86_64
          test -s runtime-x86_64
          # Type-2-Magic (AI\x02 an Offset 8) muss in der Runtime stehen
          python3 -c "import sys; d=open('runtime-x86_64','rb').read(11); sys.exit(0 if d[8:11]==bytes([0x41,0x49,0x02]) else 1)" \
            || { echo "Runtime ohne AppImage-Magic"; exit 1; }

          mkdir -p out
          # SquashFS mit dem SYSTEM-mksquashfs bauen (kann gzip; das in
          # appimagetool eingebettete mksquashfs kann nur zstd, das libappimage
          # in AppImageLauncher aber nicht lesen).
          rm -f app.sqfs
          mksquashfs AppDir app.sqfs -root-owned -noappend -comp gzip -b 128K -no-progress
          # Klassisches AppImage = Runtime + angehängtes SquashFS
          cat runtime-x86_64 app.sqfs > out/Kopierer-x86_64.AppImage
          chmod +x out/Kopierer-x86_64.AppImage
          ls -la out/

          echo "--- Kontrolle: SquashFS-Kompression muss gzip sein ---"
          OFF=$(for O in $(grep -aboP '\x68\x73\x71\x73' out/Kopierer-x86_64.AppImage | cut -d: -f1); do \
                  if unsquashfs -s -o "$O" out/Kopierer-x86_64.AppImage >/dev/null 2>&1; then echo "$O"; break; fi; done)
          unsquashfs -s -o "$OFF" out/Kopierer-x86_64.AppImage | grep -i compression
          unsquashfs -s -o "$OFF" out/Kopierer-x86_64.AppImage | grep -iq "compression gzip" \
            || { echo "FEHLER: nicht gzip komprimiert"; exit 1; }

      - name: Als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: Kopierer-x86_64.AppImage
          path: out/Kopierer-x86_64.AppImage
          if-no-files-found: error

      # --- Releases: bei jedem main-Build ein rollierendes "continuous"-Release,
      #     bei einem v*-Tag ein reguläres versioniertes Release ---
      - name: Continuous-Release (bei Push auf main)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES="Automatischer AppImage-Build vom neuesten main-Stand (Commit ${GITHUB_SHA:0:7})."
          if gh release view continuous >/dev/null 2>&1; then
            # Release existiert -> nur Asset ersetzen und Notiz aktualisieren
            # (kein Löschen -> nie ein Zustand mit Tag ohne Release)
            gh release upload continuous out/Kopierer-x86_64.AppImage --clobber
            gh release edit continuous --title "Continuous build (main)" --notes "$NOTES" --prerelease=false --latest
          else
            gh release create continuous out/Kopierer-x86_64.AppImage \
              --title "Continuous build (main)" --notes "$NOTES" --target "$GITHUB_SHA"
          fi

      - name: Versions-Release (bei v*-Tag)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" out/Kopierer-x86_64.AppImage \
            --title "$GITHUB_REF_NAME" \
            --notes "Release $GITHUB_REF_NAME" \
          || gh release upload "$GITHUB_REF_NAME" out/Kopierer-x86_64.AppImage --clobber
